[alembic]
script_location = migrations
prepend_sys_path = .

# URL được override bởi env.py (đọc từ biến môi trường DATABASE_URL)
# Đặt placeholder để alembic không báo lỗi thiếu key
sqlalchemy.url = postgresql+asyncpg://localhost/data_service

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
